name: CI

on:
  push:
    branches:
      - main
      - master
      - "*"
  pull_request:
    branches:
      - main
      - master

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auto_iq
          POSTGRES_USER: auto_iq
          POSTGRES_PASSWORD: ci-${{ github.run_id }}-db-auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auto_iq -d auto_iq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://auto_iq:ci-${{ github.run_id }}-db-auth@localhost:5432/auto_iq
      DATABASE_SSL: false
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API lint
        run: pnpm --filter api lint

      - name: Run API typecheck
        run: pnpm --filter api typecheck

      - name: Run API tests
        run: pnpm --filter api test

      - name: Export OpenAPI document
        run: OPENAPI_OUTPUT_PATH=../../artifacts/openapi.json pnpm --filter api openapi:export

      - name: Check shared contract routes against OpenAPI
        run: OPENAPI_DOCUMENT=artifacts/openapi.json pnpm --filter @auto-iq/contracts test
