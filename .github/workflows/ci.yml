name: CI

on:
  push:
    branches:
      - main
      - master
      - "**"
  pull_request:
    branches:
      - main
      - master

jobs:
  mobile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Test release source guard
        run: >-
          node --test
          scripts/mobile/assert-committed-source.test.mjs
          scripts/mobile/assert-release-apk.test.mjs
          scripts/mobile/ci-workflow.test.mjs

      - name: Install mobile dependencies
        run: flutter pub get --enforce-lockfile
        working-directory: apps/mobile

      - name: Analyze mobile source
        run: flutter analyze
        working-directory: apps/mobile

      - name: Run mobile tests
        run: flutter test
        working-directory: apps/mobile

      - name: Compile Android debug APK
        run: >-
          flutter build apk --debug
          --dart-define=AUTO_IQ_API_BASE_URL=https://api.example.invalid
        working-directory: apps/mobile

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auto_iq
          POSTGRES_USER: auto_iq
          POSTGRES_PASSWORD: ci-${{ github.run_id }}-db-auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auto_iq -d auto_iq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://auto_iq:ci-${{ github.run_id }}-db-auth@localhost:5432/auto_iq
      DATABASE_SSL: false
      REDIS_URL: redis://localhost:6379
      DEFAULT_TENANT_ID: 11111111-1111-4111-8111-111111111111
      RUN_RLS_INTEGRATION: true
      RUN_NOTIFICATION_INTEGRATION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API lint
        run: pnpm --filter api lint

      - name: Run API typecheck
        run: pnpm --filter api typecheck

      - name: Run database migrations
        run: pnpm --filter api migration:run

      - name: Run API tests
        run: pnpm --filter api test

      - name: Export OpenAPI document
        run: OPENAPI_OUTPUT_PATH=../../artifacts/openapi.json pnpm --filter api openapi:export

      - name: Check shared contract routes against OpenAPI
        run: OPENAPI_DOCUMENT=artifacts/openapi.json pnpm --filter @auto-iq/contracts test

      - name: Check OpenAPI methods and critical DTO shapes
        run: OPENAPI_DOCUMENT=artifacts/openapi.json node scripts/check-openapi-contract.mjs

  web:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api-ci.example.invalid
      STORAGE_PUBLIC_BASE_URL: https://assets-ci.example.invalid
      NEXT_PUBLIC_SITE_URL: https://web-ci.example.invalid
      SENTRY_DSN: https://public@example.ingest.sentry.io/1
      NEXT_PUBLIC_SENTRY_DSN: https://public@example.ingest.sentry.io/1
      SENTRY_ENVIRONMENT: ci
      SENTRY_RELEASE: ci-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web lint
        run: pnpm --filter @autoiq/web lint

      - name: Run web typecheck
        run: pnpm --filter @autoiq/web typecheck

      - name: Run web tests
        run: pnpm --filter @autoiq/web test

      - name: Run web production readiness checks
        run: |
          node scripts/check-web-production-readiness.mjs
          node scripts/check-contract-routes.mjs
          node scripts/check-web-saved-vehicles-contract.mjs
          node scripts/check-web-buy-sell-funnels.mjs
          node scripts/check-web-seo-and-vehicle-detail.mjs

      - name: Build web production artifact
        run: pnpm --filter @autoiq/web build
