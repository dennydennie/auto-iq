services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-iq-postgres
    environment:
      POSTGRES_DB: auto_iq
      POSTGRES_USER: auto_iq
      POSTGRES_PASSWORD: ${AUTO_IQ_POSTGRES_PASSWORD:?Set AUTO_IQ_POSTGRES_PASSWORD}
    ports:
      - "${AUTO_IQ_POSTGRES_PORT:-5432}:5432"
    volumes:
      - auto_iq_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_iq -d auto_iq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auto-iq-redis
    ports:
      - "${AUTO_IQ_REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - auto_iq_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: auto-iq-minio
    environment:
      MINIO_ROOT_USER: ${AUTO_IQ_MINIO_ACCESS_KEY:?Set AUTO_IQ_MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${AUTO_IQ_MINIO_SECRET_KEY:?Set AUTO_IQ_MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "${AUTO_IQ_MINIO_PORT:-9000}:9000"
      - "${AUTO_IQ_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - auto_iq_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AUTO_IQ_MINIO_ACCESS_KEY:?Set AUTO_IQ_MINIO_ACCESS_KEY} ${AUTO_IQ_MINIO_SECRET_KEY:?Set AUTO_IQ_MINIO_SECRET_KEY} &&
      mc mb --ignore-existing local/auto-iq-local
      "

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: auto-iq-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 4000
      API_PORT: 4000
      DATABASE_URL: postgresql://auto_iq:${AUTO_IQ_POSTGRES_PASSWORD:?Set AUTO_IQ_POSTGRES_PASSWORD}@postgres:5432/auto_iq
      DATABASE_SSL: "false"
      REDIS_URL: redis://redis:6379
      CSRF_COOKIE_NAME: auto_iq_csrf
      CSRF_HEADER_NAME: x-csrf-token
      SESSION_COOKIE_NAME: auto_iq_session
      SESSION_COOKIE_DOMAIN:
      SESSION_COOKIE_SAME_SITE: lax
      SESSION_COOKIE_SECURE: "false"
      SESSION_SECRET: ${AUTO_IQ_SESSION_SECRET:?Set AUTO_IQ_SESSION_SECRET}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: ${AUTO_IQ_MINIO_ACCESS_KEY:?Set AUTO_IQ_MINIO_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${AUTO_IQ_MINIO_SECRET_KEY:?Set AUTO_IQ_MINIO_SECRET_KEY}
      STORAGE_BUCKET: auto-iq-local
      STORAGE_PUBLIC_BASE_URL: http://10.0.2.2:${AUTO_IQ_MINIO_PORT:-9000}
      STORAGE_FORCE_PATH_STYLE: "true"
      STORAGE_PRESIGN_TTL_SECONDS: 900
      SWAGGER_ENABLED: "true"
      SENTRY_DSN:
      SENTRY_ENVIRONMENT: development
      SENTRY_RELEASE: docker-local
      ENABLE_TEST_ERROR_ROUTE: "false"
      NOTIFICATION_ACTIVE_CHANNELS: EMAIL,SMS
      NOTIFICATION_MAX_ATTEMPTS: 3
      NOTIFICATION_RETRY_DELAY_SECONDS: 5
      NOTIFICATION_REMINDER_INTERVAL_MS: 60000
    command: >-
      sh -lc "pnpm --filter api migration:run && pnpm --filter api start"
    ports:
      - "${AUTO_IQ_API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:4000/api/v1/health/ready | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

  seed:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: auto-iq-seed
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE: http://api:4000/api/v1
      DATABASE_URL: postgresql://auto_iq:${AUTO_IQ_POSTGRES_PASSWORD:?Set AUTO_IQ_POSTGRES_PASSWORD}@postgres:5432/auto_iq
      PASSWORD: ${AUTO_IQ_SEED_PASSWORD:?Set AUTO_IQ_SEED_PASSWORD}
    command: ["node", "apps/api/scripts/seed-mobile-demo.mjs"]

volumes:
  auto_iq_postgres:
  auto_iq_redis:
  auto_iq_minio:
